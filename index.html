<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arcana Whispers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;0,900;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/cards.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="falling-stars">
    <div class="falling-star"></div>
    <div class="falling-star"></div>
    <div class="falling-star"></div>
    <div class="falling-star"></div>
    <div class="falling-star"></div>
    <div class="falling-star"></div>
    <div class="falling-star"></div>
    <div class="falling-star"></div>
    <div class="falling-star"></div>
    <div class="falling-star"></div>
    <div class="falling-star"></div>
    <div class="falling-star"></div>
  </div>
  <div class="controls-bar">
    <div class="lang-selector">
      <button class="lang-btn active" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="zh">中</button>
      <button class="lang-btn" data-lang="ja">日</button>
      <button class="lang-btn" data-lang="ko">한</button>
    </div>
    <div class="right-controls">
      <select class="deck-selector" id="deck-selector">
        <option value="rws">Original</option>
        <option value="vintage">Vintage</option>
        <option value="noir">Noir</option>
        <option value="mystic">Mystic</option>
        <option value="faded">Faded</option>
      </select>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        <span class="theme-icon-dark">&#9790;</span>
        <span class="theme-icon-light">&#9788;</span>
      </button>
    </div>
  </div>

  <main id="app">
    <!-- Home Screen -->
    <section id="screen-home" class="screen active">
      <div class="home-header">
        <!-- Celestial hero emblem: all-seeing eye crowned by sun rays, flanked by crescent moons -->
        <svg class="hero-emblem" viewBox="0 0 240 140" aria-hidden="true">
          <defs>
            <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="var(--accent-gold-light)" stop-opacity="0.9"/>
              <stop offset="100%" stop-color="var(--accent-gold)" stop-opacity="0"/>
            </radialGradient>
          </defs>
          <!-- Sun rays radiating outward -->
          <g stroke="currentColor" stroke-width="0.8" stroke-linecap="round" opacity="0.55">
            <line x1="120" y1="6" x2="120" y2="22"/>
            <line x1="96" y1="10" x2="100" y2="26"/>
            <line x1="144" y1="10" x2="140" y2="26"/>
            <line x1="74" y1="22" x2="84" y2="34"/>
            <line x1="166" y1="22" x2="156" y2="34"/>
            <line x1="58" y1="42" x2="72" y2="48"/>
            <line x1="182" y1="42" x2="168" y2="48"/>
          </g>
          <!-- Outer triangle (providence) -->
          <polygon points="120,30 184,98 56,98" fill="none" stroke="currentColor" stroke-width="1.1" opacity="0.7"/>
          <!-- Inner triangle echo -->
          <polygon points="120,46 168,92 72,92" fill="none" stroke="currentColor" stroke-width="0.6" opacity="0.35"/>
          <!-- Eye -->
          <ellipse cx="120" cy="74" rx="22" ry="11" fill="url(#eyeGlow)" stroke="currentColor" stroke-width="1.1"/>
          <circle cx="120" cy="74" r="5.5" fill="currentColor"/>
          <circle cx="121.5" cy="72.5" r="1.4" fill="var(--bg-primary)"/>
          <!-- Left crescent moon -->
          <path d="M 28 74 a 14 14 0 1 0 0 0.01 M 34 74 a 11 11 0 1 1 0 0.01" fill="currentColor" opacity="0.7"/>
          <!-- Right crescent moon (mirrored) -->
          <path d="M 212 74 a 14 14 0 1 1 0 0.01 M 206 74 a 11 11 0 1 0 0 0.01" fill="currentColor" opacity="0.7"/>
          <!-- Five-pointed star above triangle -->
          <polygon points="120,108 122.3,114.5 129.2,114.5 123.7,118.6 125.8,125 120,121 114.2,125 116.3,118.6 110.8,114.5 117.7,114.5" fill="currentColor" opacity="0.85"/>
          <!-- Small flanking stars -->
          <circle cx="48" cy="118" r="1.4" fill="currentColor" opacity="0.6"/>
          <circle cx="192" cy="118" r="1.4" fill="currentColor" opacity="0.6"/>
          <circle cx="72" cy="128" r="1" fill="currentColor" opacity="0.4"/>
          <circle cx="168" cy="128" r="1" fill="currentColor" opacity="0.4"/>
        </svg>

        <h1 class="site-title" data-i18n="siteTitle">Arcana Whispers</h1>
        <p class="site-subtitle" data-i18n="siteSubtitle">Draw the cards and discover what the universe has to tell you</p>

        <!-- Ornamental divider: line + diamond + line motif -->
        <svg class="ornament-divider" viewBox="0 0 320 16" aria-hidden="true">
          <line x1="0" y1="8" x2="138" y2="8" stroke="currentColor" stroke-width="0.6" opacity="0.5"/>
          <line x1="182" y1="8" x2="320" y2="8" stroke="currentColor" stroke-width="0.6" opacity="0.5"/>
          <polygon points="160,2 168,8 160,14 152,8" fill="none" stroke="currentColor" stroke-width="0.8"/>
          <circle cx="160" cy="8" r="1.4" fill="currentColor"/>
          <circle cx="142" cy="8" r="1" fill="currentColor" opacity="0.5"/>
          <circle cx="178" cy="8" r="1" fill="currentColor" opacity="0.5"/>
        </svg>
      </div>

      <div class="spread-options">
        <button class="spread-option" data-spread="single">
          <div class="spread-option-left">
            <!-- Glyph: a single upright card -->
            <svg class="spread-glyph" viewBox="0 0 48 48" aria-hidden="true">
              <rect x="18" y="8" width="14" height="22" fill="none" stroke="currentColor" stroke-width="1.2"/>
              <circle cx="25" cy="19" r="2" fill="currentColor" opacity="0.7"/>
              <line x1="22" y1="24" x2="28" y2="24" stroke="currentColor" stroke-width="0.6" opacity="0.5"/>
              <!-- Single star above -->
              <polygon points="25,38 26,41 29,41 26.5,43 27.5,46 25,44.2 22.5,46 23.5,43 21,41 24,41" fill="currentColor" opacity="0.8"/>
            </svg>
            <h3 data-i18n="singleTitle">Single Card</h3>
          </div>
          <div class="spread-option-right">
            <p data-i18n="singleDesc">Quick insight and guidance</p>
            <span class="card-count" data-i18n="singleCount">1 card</span>
          </div>
        </button>

        <button class="spread-option" data-spread="threeCard">
          <div class="spread-option-left">
            <!-- Glyph: three cards side by side -->
            <svg class="spread-glyph" viewBox="0 0 48 48" aria-hidden="true">
              <rect x="5" y="12" width="11" height="18" fill="none" stroke="currentColor" stroke-width="1.1" opacity="0.7"/>
              <rect x="18.5" y="9" width="11" height="22" fill="none" stroke="currentColor" stroke-width="1.2"/>
              <rect x="32" y="12" width="11" height="18" fill="none" stroke="currentColor" stroke-width="1.1" opacity="0.7"/>
              <!-- Tiny sun in center card -->
              <circle cx="24" cy="20" r="2" fill="currentColor" opacity="0.85"/>
              <!-- Arrow row: past → present → future -->
              <line x1="6" y1="40" x2="42" y2="40" stroke="currentColor" stroke-width="0.5" opacity="0.45"/>
              <polygon points="42,40 39,38.5 39,41.5" fill="currentColor" opacity="0.6"/>
            </svg>
            <h3 data-i18n="threeTitle">Three Card Spread</h3>
          </div>
          <div class="spread-option-right">
            <p data-i18n="threeDesc">Past, present, and future</p>
            <span class="card-count" data-i18n="threeCount">3 cards</span>
          </div>
        </button>

        <button class="spread-option" data-spread="celticCross">
          <div class="spread-option-left">
            <!-- Glyph: celtic cross layout (cross + staff column) -->
            <svg class="spread-glyph" viewBox="0 0 48 48" aria-hidden="true">
              <!-- Cross: vertical card -->
              <rect x="13" y="9" width="10" height="16" fill="none" stroke="currentColor" stroke-width="1.1"/>
              <!-- Cross: horizontal card (rotated) -->
              <rect x="10" y="14" width="16" height="10" fill="none" stroke="currentColor" stroke-width="1.1" opacity="0.85"/>
              <!-- Surrounding context cards (smaller) -->
              <rect x="13" y="1" width="10" height="6" fill="none" stroke="currentColor" stroke-width="0.7" opacity="0.55"/>
              <rect x="13" y="28" width="10" height="6" fill="none" stroke="currentColor" stroke-width="0.7" opacity="0.55"/>
              <rect x="1" y="14" width="6" height="10" fill="none" stroke="currentColor" stroke-width="0.7" opacity="0.55"/>
              <rect x="29" y="14" width="6" height="10" fill="none" stroke="currentColor" stroke-width="0.7" opacity="0.55"/>
              <!-- Staff column (4 cards on the right) -->
              <rect x="39" y="3" width="7" height="8" fill="none" stroke="currentColor" stroke-width="0.7" opacity="0.7"/>
              <rect x="39" y="13" width="7" height="8" fill="none" stroke="currentColor" stroke-width="0.7" opacity="0.7"/>
              <rect x="39" y="23" width="7" height="8" fill="none" stroke="currentColor" stroke-width="0.7" opacity="0.7"/>
              <rect x="39" y="33" width="7" height="8" fill="none" stroke="currentColor" stroke-width="0.7" opacity="0.7"/>
              <!-- Pentacle at bottom-left for mystique -->
              <polygon points="6,42 7,44.5 9.5,44.5 7.5,46 8,48 6,46.8 4,48 4.5,46 2.5,44.5 5,44.5" fill="currentColor" opacity="0.7"/>
            </svg>
            <h3 data-i18n="crossTitle">Celtic Cross</h3>
          </div>
          <div class="spread-option-right">
            <p data-i18n="crossDesc">Deep comprehensive reading</p>
            <span class="card-count" data-i18n="crossCount">10 cards</span>
          </div>
        </button>
      </div>
    </section>

    <!-- Reading Screen -->
    <section id="screen-reading" class="screen">
      <div class="reading-header">
        <!-- Small crescent moon glyph next to reading title -->
        <svg class="reading-glyph" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M 17 4 a 9 9 0 1 0 0 16 a 7 7 0 1 1 0 -16 z" fill="currentColor" opacity="0.75"/>
          <circle cx="6" cy="6" r="0.8" fill="currentColor" opacity="0.6"/>
          <circle cx="4" cy="13" r="0.6" fill="currentColor" opacity="0.5"/>
          <circle cx="7" cy="20" r="0.8" fill="currentColor" opacity="0.6"/>
        </svg>
        <h2 id="reading-title">Three Card Spread</h2>
        <p id="reading-desc">Focus on your question</p>
      </div>

      <div id="spread-area"></div>

      <div id="deck-area"></div>

      <div id="interpretation-panel"></div>
    </section>
  </main>

  <script src="js/app.js"></script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
