<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarot Reading</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/cards.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body class="ambient-bg">
  <div class="controls-bar">
    <div class="lang-selector">
      <button class="lang-btn active" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="zh">中</button>
      <button class="lang-btn" data-lang="ja">日</button>
      <button class="lang-btn" data-lang="ko">한</button>
    </div>
    <div class="right-controls">
      <select class="deck-selector" id="deck-selector">
        <option value="rws">Original</option>
        <option value="vintage">Vintage</option>
        <option value="noir">Noir</option>
        <option value="mystic">Mystic</option>
        <option value="faded">Faded</option>
      </select>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        <span class="theme-icon-dark">&#9790;</span>
        <span class="theme-icon-light">&#9788;</span>
      </button>
    </div>
  </div>

  <main id="app">
    <!-- Home Screen -->
    <section id="screen-home" class="screen active">
      <div class="home-header">
        <h1 class="site-title" data-i18n="siteTitle">Tarot Reading</h1>
        <p class="site-subtitle" data-i18n="siteSubtitle">Draw the cards and discover what the universe has to tell you</p>
      </div>

      <div class="spread-options">
        <button class="spread-option" data-spread="single">
          <h3 data-i18n="singleTitle">Single Card</h3>
          <p data-i18n="singleDesc">Quick insight and guidance</p>
          <span class="card-count" data-i18n="singleCount">1 card</span>
        </button>

        <button class="spread-option" data-spread="threeCard">
          <h3 data-i18n="threeTitle">Three Card Spread</h3>
          <p data-i18n="threeDesc">Past, present, and future</p>
          <span class="card-count" data-i18n="threeCount">3 cards</span>
        </button>

        <button class="spread-option" data-spread="celticCross">
          <h3 data-i18n="crossTitle">Celtic Cross</h3>
          <p data-i18n="crossDesc">Deep comprehensive reading</p>
          <span class="card-count" data-i18n="crossCount">10 cards</span>
        </button>
      </div>
    </section>

    <!-- Reading Screen -->
    <section id="screen-reading" class="screen">
      <div class="reading-header">
        <h2 id="reading-title">Three Card Spread</h2>
        <p id="reading-desc">Focus on your question</p>
      </div>

      <div id="spread-area"></div>

      <div id="deck-area"></div>

      <div id="interpretation-panel"></div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
